name: Image Build

on:
  workflow_dispatch

permissions:
  id-token: write
  contents: write
jobs:
  image:
    if: github.actor == 'chkimes'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4

    - name: Setup Go
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v5
      with:
        go-version: 1.24.x

    - name: Build Attestation Client + Server
      run: |
        cd attest
        go get ./...
        go build -o ../build-azure ./...

    - name: Login to Azure
      uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Build Azure VM
      env:
        AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        AZURE_LOCATION: ${{ secrets.AZURE_LOCATION }}
        AZURE_VM_NAME: ${{ secrets.AZURE_VM_NAME }}
      run: |
        set -e

        build-azure/build.sh
        
        mkdir img
        tar -xzvf image.tar.gz -C img

    - name: Upload artifacts
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: image
        path: img/*

    - name: Generate provenance
      uses: github-early-access/generate-build-provenance@5fb744556d7e95958990349de0ddb84909c219bb #main
      with:
        subject-path: img/*
    
